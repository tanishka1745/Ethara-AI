<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Test Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 25px; }
        .card h2 { color: #333; margin-bottom: 15px; font-size: 1.5em; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        button { background: #667eea; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        button:hover { background: #764ba2; }
        .result { background: #f5f5f5; border-left: 4px solid #667eea; padding: 15px; margin-top: 15px; border-radius: 5px; max-height: 300px; overflow-y: auto; }
        .success { border-left-color: #4caf50; }
        .error { border-left-color: #f44336; }
        .response-text { font-family: 'Courier New', monospace; font-size: 0.9em; white-space: pre-wrap; word-break: break-all; }
        .status { padding: 10px 15px; border-radius: 5px; margin-bottom: 15px; font-weight: 600; }
        .status.ok { background: #c8e6c9; color: #2e7d32; }
        .status.error { background: #ffcdd2; color: #c62828; }
        .api-link { display: inline-block; margin-top: 20px; padding: 15px 25px; background: #4CAF50; color: white; text-decoration: none; border-radius: 5px; font-weight: 600; }
        .api-link:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Inventory Management</h1>
            <p>Full-Stack API Test Dashboard</p>
            <a href="http://localhost:8000/docs" class="api-link" target="_blank">🔗 Open Full API Docs (Swagger)</a>
        </div>

        <div class="grid">
            <!-- Products Section -->
            <div class="card">
                <h2>📋 Products</h2>
                <div class="status ok">✓ API Ready</div>
                
                <div class="form-group">
                    <label>Product Name:</label>
                    <input type="text" id="productName" placeholder="e.g., Laptop" value="Laptop">
                </div>
                <div class="form-group">
                    <label>SKU:</label>
                    <input type="text" id="productSku" placeholder="e.g., LAPTOP-001" value="LAPTOP-001">
                </div>
                <div class="form-group">
                    <label>Price:</label>
                    <input type="number" id="productPrice" placeholder="e.g., 999.99" value="999.99" step="0.01">
                </div>
                <div class="form-group">
                    <label>Quantity:</label>
                    <input type="number" id="productQty" placeholder="e.g., 10" value="10">
                </div>
                <button onclick="createProduct()">➕ Create Product</button>
                <button onclick="getProducts()">📥 Get All Products</button>
                <div id="productResult" class="result"></div>
            </div>

            <!-- Customers Section -->
            <div class="card">
                <h2>👥 Customers</h2>
                <div class="status ok">✓ API Ready</div>
                
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" id="customerName" placeholder="e.g., John Doe" value="John Doe">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="customerEmail" placeholder="e.g., john@example.com" value="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="tel" id="customerPhone" placeholder="e.g., 1234567890" value="1234567890">
                </div>
                <button onclick="createCustomer()">➕ Create Customer</button>
                <button onclick="getCustomers()">📥 Get All Customers</button>
                <div id="customerResult" class="result"></div>
            </div>

            <!-- Health Check -->
            <div class="card">
                <h2>🏥 System Health</h2>
                <button onclick="checkHealth()">Check Status</button>
                <div id="healthResult" class="result"></div>
            </div>

            <!-- API Endpoints -->
            <div class="card">
                <h2>📚 Available Endpoints</h2>
                <div id="endpointsList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function apiCall(method, endpoint, data = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) options.body = JSON.stringify(data);
                
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const result = await response.json();
                return { success: response.ok, data: result, status: response.status };
            } catch (error) {
                return { success: false, data: { error: error.message }, status: 0 };
            }
        }

        async function createProduct() {
            const data = {
                name: document.getElementById('productName').value,
                sku: document.getElementById('productSku').value,
                price: parseFloat(document.getElementById('productPrice').value),
                quantity: parseInt(document.getElementById('productQty').value)
            };
            const res = await apiCall('POST', '/products/', data);
            showResult('productResult', res);
        }

        async function getProducts() {
            const res = await apiCall('GET', '/products/');
            showResult('productResult', res);
        }

        async function createCustomer() {
            const data = {
                full_name: document.getElementById('customerName').value,
                email: document.getElementById('customerEmail').value,
                phone: document.getElementById('customerPhone').value
            };
            const res = await apiCall('POST', '/customers/', data);
            showResult('customerResult', res);
        }

        async function getCustomers() {
            const res = await apiCall('GET', '/customers/');
            showResult('customerResult', res);
        }

        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/docs`);
                const result = {
                    success: response.ok,
                    data: { status: response.ok ? '✓ Backend Running' : '✗ Backend Down' },
                    status: response.status
                };
                showResult('healthResult', result);
            } catch (error) {
                showResult('healthResult', { success: false, data: { error: error.message }, status: 0 });
            }
        }

        function showResult(elementId, result) {
            const elem = document.getElementById(elementId);
            const className = result.success ? 'success' : 'error';
            elem.className = `result ${className}`;
            elem.innerHTML = `<div class="response-text">${JSON.stringify(result.data, null, 2)}</div>`;
        }

        function loadEndpoints() {
            const endpoints = [
                '✓ POST /products/ - Create product',
                '✓ GET /products/ - List products',
                '✓ GET /products/{id} - Get product',
                '✓ PUT /products/{id} - Update product',
                '✓ DELETE /products/{id} - Delete product',
                '✓ POST /customers/ - Create customer',
                '✓ GET /customers/ - List customers',
                '✓ GET /customers/{id} - Get customer',
                '✓ POST /orders/ - Create order',
                '✓ GET /orders/ - List orders'
            ];
            document.getElementById('endpointsList').innerHTML = 
                endpoints.map(ep => `<div style="padding: 8px; background: #f0f0f0; margin: 5px 0; border-radius: 3px;">${ep}</div>`).join('');
        }

        window.onload = () => {
            loadEndpoints();
            checkHealth();
        };
    </script>
</body>
</html>
